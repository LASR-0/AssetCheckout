services:
  asset-checkout:
    container_name: AssetCheckout
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    ports:
      - "3000:3000"
    volumes:
      - /assetc/data:/data
    env_file:
      - backend/.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/database.db
      - PORT=3000
    restart: unless-stopped
